name: Build Android LLVM r383902b

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Clone Google LLVM
      run: |
        git clone --depth 1 --branch llvm-r383902b https://android.googlesource.com/toolchain/llvm-project
        cd llvm-project
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake ninja-build gcc g++ python3
    
    - name: Configure CMake
      run: |
        cd llvm-project
        mkdir build && cd build
        cmake -G Ninja -S ../llvm -B . \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_ENABLE_PROJECTS="clang;clang-tools-extra;lld;polly" \
          -DCMAKE_CXX_STANDARD=14 \
          -DCMAKE_CXX_FLAGS="-include limits" \
          -DLLVM_ENABLE_WERROR=OFF \
          -DLLVM_ENABLE_WARNINGS=OFF \
          -DLLVM_TARGETS_TO_BUILD="AArch64;ARM;X86" \
          -DCMAKE_INSTALL_PREFIX=/usr/local
    
    - name: Build
      run: |
        cd llvm-project/build
        ninja -j$(nproc)
    
    - name: Install
      run: |
        cd llvm-project/build
        sudo ninja install
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: llvm-clang
        path: /usr/local/bin/
